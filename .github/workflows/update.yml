name: Update results & standings

on:
  push:
    branches: [main] # любой «человеческий» пуш стартует цикл сразу (коммиты бота через GITHUB_TOKEN его НЕ триггерят — без зацикливания)
  workflow_dispatch: {}
  schedule:
    # «Сторож» каждые 15 минут: держит в очереди следующий длинный прогон и, если live-loop
    # упал, перезапускает его (concurrency + cancel-in-progress: false), чтобы таблица
    # пересобиралась минимум раз в ~15-20 мин. При живом live-loop — каждые 2 минуты.
    - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: live
  # true: свежий прогон вытесняет зависший/застрявший (иначе зависший live-loop
  # держит слот и блокирует обновления — пересборка таблицы останавливается).
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # ~5.8 часа (лимит job — 6 ч)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # нужна история для проверки времени коммита ставок

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Live loop (обновление каждые 2 минуты ~5.5 часа)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ACTION_PRIVATE_KEY: ${{ secrets.ACTION_PRIVATE_KEY }}
          SHARED_KEY: ${{ secrets.SHARED_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@github.com"
          END=$((SECONDS + 19800)) # ~5.5 часа
          while [ $SECONDS -lt $END ]; do
            node scripts/update.mjs || true
            if [ -n "$(git status --porcelain data/ config/app.json)" ]; then
              git add data/ config/app.json
              git commit -m "auto: обновление результатов и таблицы" || true
              git pull --rebase --no-edit origin main 2>/dev/null || git rebase --abort 2>/dev/null || true
              git push 2>/dev/null || true
            fi
            sleep 120
          done
